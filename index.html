<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>연습 날짜 정하기 · Practice Sync</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#a78bfa">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f8fafc; --panel: #ffffff; --panel-2: #f1f5f9; --line: #e2e8f0; --text: #1e293b;
    --muted: #64748b; --accent: #a78bfa; --accent-2: #38bdf8; --gold: #fbbf24; --silver: #94a3b8; --bronze: #d97706;
  }
  *{box-sizing:border-box}
  html,body {
    margin:0; padding:0; background: radial-gradient(1200px 800px at 20% -10%, #eff6ff 0%, transparent 60%), radial-gradient(900px 600px at 110% 10%, #faf5ff 0%, transparent 55%), var(--bg);
    color: var(--text); font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',system-ui,-apple-system,sans-serif; scroll-behavior:smooth; min-height: 100vh;
  }
  a { color: var(--accent-2); text-decoration:none; font-weight: 500; }
  button { font-family:inherit; }
  .container { max-width:680px; margin:0 auto; padding:0 20px 40px; }
  .nav { position:sticky; top:0; z-index:50; backdrop-filter:saturate(140%) blur(12px); background:rgba(255,255,255,.7); border-bottom:1px solid var(--line); }
  .nav-inner { display:flex; align-items:center; justify-content:center; padding:14px 20px; }
  .brand { display:flex; gap:10px; align-items:center; font-weight:800; letter-spacing:.2px; color: #334155; font-size: 18px; }
  .brand .dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow:0 0 12px rgba(167, 139, 250, 0.6); }
  .hero { padding:40px 0 20px; text-align:center; }
  .hero h1 { font-size:clamp(24px,4vw,32px); margin:16px 0 8px; letter-spacing:-.5px; font-weight: 800; color: #0f172a; }
  .hero p.lead { color:var(--muted); max-width:500px; margin:0 auto 24px; line-height:1.5; font-size: 15px; }
  .speaker-wrap { display:flex; justify-content:center; margin-bottom: 16px; }
  .speaker { width:140px; height:140px; filter:drop-shadow(0 10px 20px rgba(167, 139, 250, .2)); }
  .card { background: var(--panel); border:1px solid var(--line); border-radius:24px; padding:28px; box-shadow:0 20px 40px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.02); margin-bottom: 32px; }
  .field { margin-bottom: 16px; text-align: left; }
  .field label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
  .input { width:100%; background:#f8fafc; border:1px solid var(--line); color:var(--text); padding:14px 14px; border-radius:12px; font-size:15px; outline:none; transition:all .2s; }
  .input:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(167,139,250,.15); }
  
  .btn { width: 100%; background:linear-gradient(135deg, var(--accent), #818cf8); color:#fff; border:none; border-radius:12px; padding:14px 18px; font-weight:700; cursor:pointer; font-size:15px; transition:transform .08s ease, box-shadow .2s; box-shadow:0 8px 20px rgba(167, 139, 250, .3); display: flex; justify-content: center; align-items: center; gap: 8px;}
  .btn:hover { transform:translateY(-2px); box-shadow:0 12px 24px rgba(167, 139, 250, .4); }
  .btn.ghost { background:transparent; border:1px solid var(--line); box-shadow:none; color:var(--text); }
  .btn.ghost:hover { border-color:var(--accent); color:var(--accent); background: #faf5ff; }
  
  .btn-kakao { background: #FEE500; color: #000000; box-shadow: 0 4px 10px rgba(254, 229, 0, 0.2); }
  .btn-kakao:hover { box-shadow: 0 8px 20px rgba(254, 229, 0, 0.3); background: #fada0a; }
  .btn-google { background: #ffffff; color: #3c4043; border: 1px solid #dadce0; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
  .btn-google:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.08); background: #f8f9fa; }

  /* 미니 링크 복사 버튼 디자인 */
  .mini-share-btn { width: 100%; background: #faf5ff; border: 1px dashed var(--accent); color: var(--accent); font-weight: 700; padding: 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 24px; font-size: 14px; }
  .mini-share-btn:hover { background: #f3e8ff; }

  .view { display: none; opacity: 0; transition: opacity 0.3s ease; }
  .view.active { display: block; opacity: 1; animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .online-board { background: #fffbeb; border: 1px solid #fde68a; border-radius: 16px; padding: 16px; margin-bottom: 24px; }
  .online-board h4 { margin: 0 0 12px; font-size: 14px; color: #b45309; display: flex; align-items: center; gap: 6px; }
  .members-wrap { display: flex; gap: 10px; flex-wrap: wrap; }
  .member-chip { background: #fff; border: 1px solid #fcd34d; padding: 6px 12px 6px 8px; border-radius: 999px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: #92400e; }
  .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .cal-head .nav-btn { background:#fff; border:1px solid var(--line); color:var(--text); padding:8px 14px; border-radius:10px; cursor:pointer; font-weight:600; font-size:13px;}
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
  .cal-cell { aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; border-radius:12px; background:#fff; border:1px solid var(--line); cursor:pointer; font-size:15px; font-weight:500; user-select:none; }
  .cal-cell.head { background:transparent; border:none; color:var(--muted); font-size:13px; cursor:default; font-weight:600; }
  .cal-cell.dim { opacity:0; pointer-events:none; }
  .cal-cell.out-of-range { opacity:.3; pointer-events:none; background:#f8fafc; text-decoration: line-through; }
  .cal-cell.selected { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700; box-shadow:0 4px 10px rgba(167, 139, 250, .3); }
  .date-time-row { background: var(--panel-2); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--line); }
  .date-time-row strong { display: block; margin-bottom: 10px; font-size: 15px; color: var(--accent); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:8px 16px; border:1px solid var(--line); background:#fff; border-radius:999px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text); }
  .chip.active { background:linear-gradient(135deg, var(--accent), #818cf8); border-color:transparent; color:#fff; font-weight:700; }
  .ranks { display:flex; flex-direction: column; gap:16px; }
  .rank { position:relative; padding:20px; border-radius:20px; background:#fff; border:1px solid var(--line); box-shadow:0 10px 20px rgba(0,0,0,.03); overflow:hidden; }
  .rank::before { content:""; position:absolute; left:0; top:0; width:6px; height:100%; }
  .rank.r1::before { background:var(--gold); } .rank.r2::before { background:var(--silver); } .rank.r3::before { background:var(--bronze); }
  .rank .badge { display:inline-block; font-size:13px; font-weight:800; padding:4px 12px; border-radius:999px; margin-bottom:10px; }
  .rank.r1 .badge { background:#fef3c7; color:#d97706; border:1px solid #fde68a; }
  .table { width:100%; border-collapse:collapse; margin-top:12px; font-size:14px; background:#fff; border-radius:16px; overflow:hidden; border:1px solid var(--line); }
  .table th,.table td { border-bottom:1px solid var(--line); padding:14px; text-align:left; vertical-align:top; }
  .table th { background:var(--panel-2); color:var(--muted); font-weight:600; font-size:13px; }
  .tag { display:inline-block; background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:4px 10px; border-radius:8px; font-size:13px; margin:2px 4px 2px 0; }
  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; padding:12px 20px; border-radius:12px; font-size:14px; font-weight:600; display:none; z-index:200; }
  .deadline-info { background: #fffbeb; border: 1px solid #fde68a; color: #b45309; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; margin-bottom: 20px; text-align: center; }
</style>
</head>
<body>

<nav class="nav"><div class="nav-inner"><div class="brand"><span class="dot"></span> Practice Sync</div></div></nav>

<div class="container">
  
  <section id="view-auth" class="view active">
    <div class="hero">
      <div class="speaker-wrap">
        <svg class="speaker" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="96" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/><circle cx="100" cy="100" r="48" fill="#a78bfa"/></svg>
      </div>
      <h1>Practice Sync 시작하기</h1>
      <p class="lead" id="authDesc">3초 만에 로그인하고 일정을 조율해 보세요.</p>
    </div>
    <div class="card" style="max-width: 400px; margin: 0 auto; padding-top: 40px; padding-bottom: 40px;">
      <button class="btn btn-kakao" id="btnLoginKakao" style="margin-bottom: 14px;">
        <span style="font-size:18px;">💬</span> 카카오로 시작하기
      </button>
      <button class="btn btn-google" id="btnLoginGoogle">
        <span style="font-size:18px;">🌐</span> Google로 시작하기
      </button>
    </div>
  </section>

  <section id="view-create" class="view">
    <div class="hero">
      <h1>새로운 모임 만들기</h1>
      <p class="lead">방을 만들고 링크를 공유해 모두의 일정을 종합하세요.</p>
    </div>
    <div class="card">
      <div class="field"><label for="roomName">새로운 모임(방) 이름</label><input id="roomName" class="input" placeholder="예: 5월 밴드 합주 모임" /></div>
      <div class="field"><label for="roomPw">관리자(방장) 비밀번호</label><input id="roomPw" class="input" type="password" placeholder="4자리 숫자" maxlength="4" /></div>
      <button class="btn" id="btnNextSetup">다음 단계 (기한 설정) ›</button>
    </div>
  </section>

  <section id="view-host-setup" class="view">
    <div class="hero"><h1>기한 및 마감일 설정</h1></div>
    <div class="card">
      <div class="field"><label>조율할 날짜 범위</label><div class="row"><input id="hostDateStart" class="input" type="date" /><span>~</span><input id="hostDateEnd" class="input" type="date" /></div></div>
      <div class="field" style="margin-top:24px;"><label>일정 투표 마감일시</label><input id="hostDeadline" class="input" type="datetime-local" /></div>
      <div class="row" style="margin-top:32px;"><button class="btn ghost" id="btnBackCreate">‹ 뒤로</button><button class="btn" id="btnCreateRoom">방 생성 완료하기</button></div>
    </div>
  </section>

  <section id="view-set-nickname" class="view">
    <div class="hero">
      <h1>모임 닉네임 설정</h1>
      <p class="lead">모임 멤버들이 알아볼 수 있는 닉네임을 확인해 주세요.</p>
    </div>
    <div class="card">
      <div class="field"><label for="customNickname">사용할 닉네임</label><input id="customNickname" class="input" placeholder="예: 홍길동" maxlength="16" /></div>
      <button class="btn" id="btnConfirmNickname">확인 및 일정 입력하기 ›</button>
    </div>
  </section>

  <section id="view-schedule" class="view">
    <div class="card" style="margin-top:32px;">
      
      <button class="mini-share-btn" id="btnCopyLinkMini">🔗 클릭해서 초대 링크 복사하기</button>
      
      <div class="row between" style="margin-bottom: 16px;">
        <h2 style="margin:0;">내 일정 입력</h2>
        <span class="tag" id="currentUserDisplay" style="background:var(--bg); border:none; margin:0;"></span>
      </div>
      <div id="deadlineBadge" class="deadline-info">마감일: <span id="deadlineText"></span></div>
      <div class="online-board"><h4>🐾 현재 참여 완료한 멤버</h4><div class="members-wrap" id="onlineMembersList"></div></div>
      <h3>가능한 날짜 선택</h3>
      <div class="cal-head"><button class="nav-btn" id="prevMonth">‹ 이전</button><div id="calLabel" style="font-weight:700;"></div><button class="nav-btn" id="nextMonth">다음 ›</button></div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="divider"></div>
      <h3>날짜별 가능 시간</h3><div id="dateSchedules"></div>
      <div class="divider"></div>
      <h3>선호 지역 (다중 선택)</h3><div class="chips" id="regionChips"></div>
      <button class="btn" id="btnSaveSchedule" style="margin-top:32px;">내 일정 저장하고 결과 보기</button>
    </div>
  </section>

  <section id="view-result" class="view">
    <div class="card" style="margin-top:32px;">
      <div class="row between" style="margin-bottom:24px;"><h2>AI 추천 결과</h2><button class="btn ghost" id="btnGoEdit" style="width:auto; padding:8px 16px;">내 일정 수정하기</button></div>
      <div id="ranks" class="ranks"></div>
      <div id="resultEmpty" class="deadline-info" style="display:none; background:#f1f5f9; color:#475569;">추천 데이터가 부족합니다.</div>
      <div class="divider"></div>
      <h3>참여자 현황 (<span id="pCount">0</span>명)</h3>
      <table class="table"><thead><tr><th>닉네임</th><th>입력한 일정</th><th>지역</th></tr></thead><tbody id="participantsBody"></tbody></table>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
// 🚨 수파베이스 연동
const SUPABASE_URL = "https://hmnaqspyubtceqjwsutb.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtbmFxc3B5dWJ0Y2VxandzdXRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODk5NDIsImV4cCI6MjA5NjU2NTk0Mn0.qeQgMwUlVhJkQ4GJUhJ8F65ljHR9WehYBShy-PUeU5U"; 

const dbClient = typeof supabase !== 'undefined' ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

const REGIONS = ['서울 전체', '강남역·역삼·선릉·삼성', '신사·논현·청담·압구정', '서초·교대·방배', '성수·왕십리·서울숲', '종로·광화문·대학로', '용산·이태원·한남', '광진·건대·구의·군자', '성북·성신여대·안암', '홍대·합정·상수·연남', '신촌·이대·아현·연희', '망원·성산·상암', '명동·을지로·동대문역', '영등포·여의도·당산·문래', '송파·잠실·방이', '관악·신림·서울대입구', '동작·사당·이수', '강서·마곡·화곡', '도곡·대치·개포·수서', '구로·신도림·고척', '강동·성내·천호·길동', '양천·목동·신정', '노원·상계·공릉', '중랑·상봉·면목', '마포역·공덕·대흥', '금천·가산·독산', '동대문구·청량리·회기', '은평·불광·연신내', '강북·수유·미아', '도봉·쌍문·창동'];
const TIME_SLOTS = [{ id:'morning', label:'아침 09-12' }, { id:'lunch', label:'점심 12-15' }, { id:'afternoon', label:'오후 15-18' }, { id:'evening', label:'저녁 18-21' }, { id:'night', label:'밤 21-24' }];
const AVATARS = ['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐯','🐹','🐥','🐧','🐸'];

function getAvatar(name) { let sum = 0; for(let i=0; i<name.length; i++) sum += name.charCodeAt(i); return AVATARS[sum % AVATARS.length]; }
function toast(msg){ const el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; clearTimeout(el._t); el._t = setTimeout(()=>el.style.display='none', 2000); }
function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

const state = { roomId: null, room: null, myUserId: null, myNickname: '', socialName: '', calCursor: new Date(), form: { schedules:{}, regions:[] }, generatedLink: '' };
function getRoomIdFromUrl() { return new URLSearchParams(window.location.search).get('room'); }
function showView(viewId) { document.querySelectorAll('.view').forEach(el => el.classList.remove('active')); document.getElementById(viewId).classList.add('active'); window.scrollTo(0,0); }

async function dbFetchRoom(id) {
  if(!dbClient) return null;
  const { data, error } = await dbClient.from('rooms').select('*').eq('id', id);
  if(error || !data || data.length === 0) return null;
  const targetRoom = data[0];
  if(typeof targetRoom.participants === 'string') targetRoom.participants = JSON.parse(targetRoom.participants);
  if(!targetRoom.participants) targetRoom.participants = [];
  return targetRoom;
}

async function dbSaveRoom(room) {
  if(!dbClient) return;
  const payload = { id: room.id, name: room.name, password: room.password, dateStart: room.dateStart, dateEnd: room.dateEnd, deadline: room.deadline, participants: room.participants };
  await dbClient.from('rooms').upsert(payload);
  state.room = room;
}

// 🚦 라우팅의 핵심: 로그인 상태 감지 및 분기 처리
let isInitialized = false;

if (dbClient) {
  dbClient.auth.onAuthStateChange(async (event, session) => {
    
    // 1. 로그인이 안 되어 있다면 -> 무조건 시작(Auth) 화면
    if (!session) {
      const rid = getRoomIdFromUrl();
      if (rid) document.getElementById('authDesc').textContent = "초대받은 모임에 참여하려면 로그인이 필요해요!";
      showView('view-auth');
      return;
    }

    if (isInitialized) return; 
    isInitialized = true;

    // 카카오/구글 로그인 직후 꼬리표(Token) 청소
    if (window.location.hash.includes('access_token')) {
      window.history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    state.myUserId = session.user.id;
    state.socialName = session.user.user_metadata.name || session.user.user_metadata.full_name || '멤버';

    const rid = getRoomIdFromUrl();
    
    // 2. 방 번호가 없다면 -> [방장 접속자] 방 만들기 화면으로 이동
    if(!rid) { 
      showView('view-create'); 
      return; 
    }

    // 3. 방 번호가 있다면 -> [링크 접속자] 방 정보 불러오기
    const room = await dbFetchRoom(rid);
    if(!room) { alert('방을 찾을 수 없습니다.'); window.location.href = window.location.pathname; return; }

    state.roomId = rid; state.room = room;
    // 공유용 링크 세팅
    const url = new URL(window.location.href);
    url.searchParams.set('room', rid);
    state.generatedLink = url.toString();

    const existingMe = room.participants.find(p => p.userId === state.myUserId);
    
    // 이미 닉네임 설정을 마친 접속자라면?
    if (existingMe) {
      state.myNickname = existingMe.nickname;
      state.form.schedules = existingMe.schedules || {};
      state.form.regions = existingMe.regions || [];
      
      // 일정을 아직 안 짰으면 일정창으로, 짰으면 결과창으로 바로 이동
      if(Object.keys(state.form.schedules).length === 0) {
        initScheduleView();
        showView('view-schedule');
      } else {
        renderResults(); 
        showView('view-result');
      }
    } else {
      // 닉네임 설정 전인 링크 접속자라면? -> 닉네임 설정창으로 이동
      if(new Date() > new Date(state.room.deadline)) {
        alert('일정 투표가 마감되었습니다.'); renderResults(); showView('view-result'); return;
      }
      document.getElementById('customNickname').value = state.socialName;
      showView('view-set-nickname');
    }
  });
}

// 소셜 로그인 버튼 이벤트
document.getElementById('btnLoginKakao').onclick = async () => { await dbClient.auth.signInWithOAuth({ provider: 'kakao', options: { redirectTo: window.location.origin + window.location.pathname + window.location.search } }); };
document.getElementById('btnLoginGoogle').onclick = async () => { await dbClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname + window.location.search } }); };

// 방장: 방 생성 첫 단계 (기한 설정으로 이동)
document.getElementById('btnNextSetup').onclick = () => {
  if(!document.getElementById('roomName').value.trim() || document.getElementById('roomPw').value.length < 4) { toast('모임 이름과 4자리 비밀번호를 입력해 주세요.'); return; }
  showView('view-host-setup');
};
document.getElementById('btnBackCreate').onclick = () => showView('view-create');

// 🛠️ 방장: 방 생성 완료 및 닉네임 창으로 점프!
document.getElementById('btnCreateRoom').onclick = async () => {
  try {
    const name = document.getElementById('roomName').value.trim(); const pw = document.getElementById('roomPw').value.trim();
    const dStart = document.getElementById('hostDateStart').value; const dEnd = document.getElementById('hostDateEnd').value;
    const deadline = document.getElementById('hostDeadline').value;
    if(!dStart || !dEnd || !deadline) { toast('모든 값을 입력해주세요.'); return; }

    const roomId = Math.random().toString(36).slice(2,8);
    const room = { id: roomId, name, password: pw, dateStart: dStart, dateEnd: dEnd, deadline, participants: [] };
    
    await dbSaveRoom(room);
    state.roomId = roomId;
    state.room = room;
    
    // URL에 ?room=코드 조용히 박아넣기 (새로고침 방지)
    const url = new URL(window.location); url.searchParams.set('room', roomId);
    window.history.replaceState(null, '', url.toString());
    state.generatedLink = url.toString();

    // 닉네임 설정창으로 깔끔하게 이동
    document.getElementById('customNickname').value = state.socialName || '방장';
    showView('view-set-nickname');
  } catch (err) {
    alert("방 생성 중 오류가 발생했습니다. 새로고침 후 다시 시도해주세요.");
  }
};

// 방장 & 참여자 공통: 닉네임 확정 시 데이터베이스에 참가자로 등록 후 일정창으로 이동
document.getElementById('btnConfirmNickname').onclick = async () => {
  const nick = document.getElementById('customNickname').value.trim();
  if(!nick) { toast('사용할 닉네임을 입력해 주세요.'); return; }

  state.myNickname = nick;

  // 혹시 모를 동기화 방지(최신 방 정보 가져오기)
  const freshRoom = await dbFetchRoom(state.roomId);
  if(freshRoom) state.room = freshRoom;

  const existingMe = state.room.participants.find(p => p.userId === state.myUserId);
  if(!existingMe) {
    state.room.participants.push({ userId: state.myUserId, nickname: nick, schedules: {}, regions: [] });
    await dbSaveRoom(state.room);
  }

  initScheduleView(); 
  showView('view-schedule');
};

// 미니 링크 복사 버튼 (어디서든 편하게 초대!)
document.getElementById('btnCopyLinkMini').onclick = async () => {
  try { await navigator.clipboard.writeText(state.generatedLink); toast('초대 링크가 복사되었습니다! 카톡에 공유하세요.'); } catch(e) { toast('복사 실패'); }
};

function initScheduleView() {
  document.getElementById('currentUserDisplay').innerHTML = `<b>${state.myNickname}</b>님`;
  const dl = new Date(state.room.deadline);
  document.getElementById('deadlineText').textContent = `${dl.getMonth()+1}월 ${dl.getDate()}일 ${dl.getHours()}시`;
  state.calCursor = new Date(state.room.dateStart);
  renderOnlineMembers(); buildRegionChips(); renderCalendar(); renderDateSchedules();
}

function renderOnlineMembers() {
  const wrap = document.getElementById('onlineMembersList'); wrap.innerHTML = '';
  state.room.participants.forEach(p => {
    wrap.innerHTML += `<div class="member-chip"><span>${getAvatar(p.nickname)}</span><span>${p.nickname}</span></div>`;
  });
}

function renderCalendar() {
  const grid = document.getElementById('calGrid'); grid.innerHTML = '';
  const cur = state.calCursor; document.getElementById('calLabel').textContent = `${cur.getFullYear()}년 ${cur.getMonth()+1}월`;
  ['일','월','화','수','목','금','토'].forEach(h=> { grid.innerHTML += `<div class="cal-cell head">${h}</div>`; });

  const startDay = new Date(cur.getFullYear(), cur.getMonth(), 1).getDay();
  const daysInMonth = new Date(cur.getFullYear(), cur.getMonth()+1, 0).getDate();
  const rStart = new Date(state.room.dateStart).setHours(0,0,0,0);
  const rEnd = new Date(state.room.dateEnd).setHours(23,59,59,999);

  for(let i=0; i<startDay; i++) grid.innerHTML += `<div class="cal-cell dim"></div>`;
  for(let day=1; day<=daysInMonth; day++) {
    const d = new Date(cur.getFullYear(), cur.getMonth(), day); const key = ymd(d);
    const selected = state.form.schedules[key] ? 'selected' : '';
    const out = (d < rStart || d > rEnd) ? 'out-of-range' : '';
    
    const cell = document.createElement('div');
    cell.className = `cal-cell ${selected} ${out}`; cell.textContent = day;
    if(!out) {
      cell.onclick = () => {
        if(state.form.schedules[key]) delete state.form.schedules[key];
        else state.form.schedules[key] = [];
        renderCalendar(); renderDateSchedules();
      };
    }
    grid.appendChild(cell);
  }
}

document.getElementById('prevMonth').onclick = () => { state.calCursor = new Date(state.calCursor.getFullYear(), state.calCursor.getMonth()-1, 1); renderCalendar(); };
document.getElementById('nextMonth').onclick = () => { state.calCursor = new Date(state.calCursor.getFullYear(), state.calCursor.getMonth()+1, 1); renderCalendar(); };

function renderDateSchedules() {
  const container = document.getElementById('dateSchedules'); container.innerHTML = '';
  const dates = Object.keys(state.form.schedules).sort();
  if(dates.length === 0) { container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;">날짜를 먼저 선택해 주세요.</div>'; return; }

  dates.forEach(d => {
    const dObj = new Date(d); const dow = ['일','월','화','수','목','금','토'][dObj.getDay()];
    const row = document.createElement('div'); row.className = 'date-time-row';
    row.innerHTML = `<strong>${dObj.getMonth()+1}월 ${dObj.getDate()}일 (${dow})</strong><div class="chips"></div>`;
    container.appendChild(row);
    const chipsContainer = row.querySelector('.chips');
    TIME_SLOTS.forEach(t => {
      const active = state.form.schedules[d].includes(t.id) ? 'active' : '';
      const c = document.createElement('div'); c.className = `chip ${active}`; c.textContent = t.label;
      c.onclick = () => {
        const arr = state.form.schedules[d]; const idx = arr.indexOf(t.id);
        if(idx >= 0) arr.splice(idx, 1); else arr.push(t.id);
        renderDateSchedules();
      };
      chipsContainer.appendChild(c);
    });
  });
}

function buildRegionChips(){
  const el = document.getElementById('regionChips'); el.innerHTML = '';
  REGIONS.forEach(g=>{
    const active = state.form.regions.includes(g)?'active':'';
    const c = document.createElement('div'); c.className=`chip ${active}`; c.textContent = g;
    c.onclick = ()=>{
      const i = state.form.regions.indexOf(g);
      if(i>=0) state.form.regions.splice(i,1); else state.form.regions.push(g);
      buildRegionChips();
    };
    el.appendChild(c);
  });
}

document.getElementById('btnSaveSchedule').onclick = async () => {
  if(Object.keys(state.form.schedules).length === 0 || state.form.regions.length === 0){ toast('날짜, 시간, 지역을 모두 선택해 주세요.'); return; }

  const freshRoom = await dbFetchRoom(state.roomId);
  if(freshRoom) state.room = freshRoom;

  const idx = state.room.participants.findIndex(p => p.userId === state.myUserId);
  if(idx >= 0) {
    state.room.participants[idx].schedules = state.form.schedules;
    state.room.participants[idx].regions = state.form.regions;
  }

  await dbSaveRoom(state.room);
  toast('저장되었습니다!'); renderResults(); showView('view-result');
};

document.getElementById('btnGoEdit').onclick = () => { initScheduleView(); showView('view-schedule'); };

function recommend(room){
  const ps = room.participants || []; if(ps.length === 0) return [];
  const dtPairCount = {}; const regionCount = {}; const N = ps.length;
  ps.forEach(p => {
    Object.entries(p.schedules || {}).forEach(([d, times]) => {
      times.forEach(t => { const key = `${d}|${t}`; dtPairCount[key] = (dtPairCount[key] || 0) + 1; });
    });
    (p.regions || []).forEach(r => { regionCount[r] = (regionCount[r] || 0) + 1; });
  });
  const candidates = []; const topRegionEntry = Object.entries(regionCount).sort((a,b)=>b[1]-a[1])[0];
  Object.entries(dtPairCount).forEach(([dtKey, count]) => {
    const [d, t] = dtKey.split('|'); let best = null;
    const eligible = ps.filter(p => p.schedules && p.schedules[d] && p.schedules[d].includes(t));
    if(eligible.length > 0) {
      const rc = {}; eligible.forEach(p => p.regions.forEach(r => { rc[r] = (rc[r]||0) + 1; }));
      const arr = Object.entries(rc).sort((a,b)=>b[1]-a[1]);
      if(arr.length > 0) best = { region: arr[0][0] };
    }
    if(!best && topRegionEntry) best = { region: topRegionEntry[0] };
    if(!best) return;
    const score = (0.7 * (count/N)) + (0.3 * ((regionCount[best.region]||0)/N));
    candidates.push({ date: d, time: t, region: best.region, pairAvail: count, N, score });
  });
  return candidates.sort((a,b)=> b.score - a.score).slice(0, 3);
}

function timeLabel(id){ return TIME_SLOTS.find(x=>x.id===id)?.label.split(' ')[0] || id; }
function fmtDate(s){ const d=new Date(s); return `${d.getMonth()+1}/${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`; }

async function renderResults() {
  state.room = await dbFetchRoom(state.roomId) || state.room;
  const room = state.room;
  const ranksEl = document.getElementById('ranks'); const empty = document.getElementById('resultEmpty');
  
  const activePs = room.participants.filter(p => p.schedules && Object.keys(p.schedules).length > 0);

  if(activePs.length === 0){ ranksEl.innerHTML = ''; empty.style.display = 'block'; } 
  else {
    empty.style.display = 'none'; const recs = recommend(room); ranksEl.innerHTML = '';
    recs.forEach((r,i)=>{
      const fullTime = TIME_SLOTS.find(x=>x.id===r.time).label;
      ranksEl.innerHTML += `<div class="rank r${i+1}"><div class="badge">${i===0?'★ 1순위':i===1?'2순위':'3순위'}</div><h3>${fmtDate(r.date)} · ${fullTime}</h3><div style="font-size:14px;color:var(--muted)">추천지역: <b>${r.region}</b><br/>참여가능: ${r.pairAvail}명 / 전체 ${r.N}명</div></div>`;
    });
  }
  document.getElementById('pCount').textContent = room.participants.length;
  const body = document.getElementById('participantsBody'); body.innerHTML = '';
  room.participants.forEach(p=>{
    let schedHtml = '';
    Object.keys(p.schedules || {}).sort().forEach(d => {
      if(p.schedules[d].length > 0) schedHtml += `<div style="margin-bottom:4px;"><span class="tag" style="background:#fff">${fmtDate(d)}</span> <span style="font-size:12px;color:var(--muted)">${p.schedules[d].map(timeLabel).join(', ')}</span></div>`;
    });
    body.innerHTML += `<tr><td><div style="display:flex;align-items:center;gap:4px;"><span>${getAvatar(p.nickname)}</span><b>${p.nickname}</b>${p.userId===state.myUserId?' (나)':''}</div></td><td>${schedHtml || '선택중...'}</td><td>${(p.regions || []).map(r=>`<span class="tag" style="background:#fff">${r}</span>`).join('') || '-'}</td></tr>`;
  });
}
